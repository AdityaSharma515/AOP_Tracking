<script>
/**
 * js/positions.html
 */
var allPositions = [];
var filteredPositions = [];
var posDepartments = [];
var posSubDepartments = [];
var currentPosPage = 1;
var posRowsPerPage = 10;
var posSessionRole = null;
var posInitialized = false;

function initPositions() {
    if (posInitialized) return;
    posInitialized = true;
    posSessionRole = currentUserRole;
    setupPosEventListeners();
    loadPositionsData();
}

function setupPosEventListeners() {
    const searchInput = document.getElementById('positionSearch');
    if(searchInput) searchInput.addEventListener('input', debounce(searchPositions, 300));
    
    const filters = document.querySelectorAll('.form-select');
    filters.forEach(f => f.addEventListener('change', filterPositions));
    
    const deptSelect = document.getElementById('newPosDept');
    if (deptSelect) {
        deptSelect.addEventListener('change', (e) => {
            const deptName = e.target.value;
            const dept = posDepartments.find(d => d.DepartmentName === deptName);
            const subDeptSelect = document.getElementById('newPosSubDept');
            if (subDeptSelect) {
                subDeptSelect.innerHTML = '<option value="" selected disabled>Select Sub Department</option>';
                if (dept) {
                    const subs = posSubDepartments.filter(s => s.DepartmentID === dept.DepartmentID);
                    subs.forEach(s => {
                        subDeptSelect.innerHTML += `<option value="${s.SubDepartmentName}">${s.SubDepartmentName}</option>`;
                    });
                }
            }
        });
    }
}

async function loadPositionsData() {
    showLoader();
    try {
        const [res, deptRes, subDeptRes] = await Promise.all([
            server.getPositions(localStorage.getItem('sessionId')),
            server.getDepartments(localStorage.getItem('sessionId')),
            server.getSubDepartments(localStorage.getItem('sessionId'))
        ]);
        
        if (deptRes.success) {
            posDepartments = deptRes.data;
            posSubDepartments = subDeptRes.success ? subDeptRes.data : [];
            populatePosDepartmentDropdowns();
        }
        
        if (res.success) {
            allPositions = res.data;
            filteredPositions = [...allPositions];
            populatePositionTable();
            populateReportsToDropdown();
        } else {
            showError(res.message);
            document.getElementById('positionsTableBody').innerHTML = `<tr><td colspan="7" class="text-center py-4 text-muted">No positions found</td></tr>`;
        }
    } catch (e) {
        showError("Failed to load positions");
        document.getElementById('positionsTableBody').innerHTML = `<tr><td colspan="7" class="text-center py-4 text-muted">Error loading positions</td></tr>`;
    } finally {
        hideLoader();
    }
}

function populatePosDepartmentDropdowns() {
    const filter = document.getElementById('positionDeptFilter');
    const deptSelect = document.getElementById('newPosDept');
    
    if (filter) {
        filter.innerHTML = '<option selected value="All Departments">All Departments</option>';
        posDepartments.forEach(d => {
            filter.innerHTML += `<option value="${d.DepartmentName}">${d.DepartmentName}</option>`;
        });
    }
    
    if (deptSelect) {
        deptSelect.innerHTML = '<option value="" selected disabled>Select Department</option>';
        posDepartments.forEach(d => {
            deptSelect.innerHTML += `<option value="${d.DepartmentName}">${d.DepartmentName}</option>`;
        });
    }
}

function populateReportsToDropdown() {
    const reportsToSelect = document.getElementById('newPosReportsTo');
    if (reportsToSelect) {
        reportsToSelect.innerHTML = '<option value="" selected disabled>Select Parent Position</option>';
        allPositions.forEach(p => {
            reportsToSelect.innerHTML += `<option value="${p.PositionID}">${p.PositionTitle} (${p.PositionID})</option>`;
        });
    }
}

async function createPosition(data) {
    if(!validatePositionForm(data)) return;
    
    showLoader();
    try {
        const res = await server.createPosition(localStorage.getItem('sessionId'), data);
        if (res.success) {
            showSuccess("Position created");
            loadPositionsData();
            const modal = bootstrap.Modal.getInstance(document.getElementById('addPositionModal'));
            if(modal) modal.hide();
        } else {
            showError(res.message);
        }
    } catch (e) {
        showError("Creation failed");
    } finally {
        hideLoader();
    }
}

async function updatePosition(id, data) {
    showLoader();
    try {
        const res = await server.updatePosition(localStorage.getItem('sessionId'), id, data);
        if (res.success) {
            showSuccess("Position updated");
            loadPositionsData();
        } else {
            showError(res.message);
        }
    } catch (e) {
        showError("Update failed");
    } finally {
        hideLoader();
    }
}

async function deletePosition(id) {
    if (!confirmDelete("Delete this position? Cannot be undone if no direct reports exist.")) return;
    showLoader();
    try {
        const res = await server.deletePosition(localStorage.getItem('sessionId'), id);
        if (res.success) {
            showSuccess("Position deleted");
            loadPositionsData();
        } else {
            showError(res.message);
        }
    } catch (e) {
        showError("Deletion failed");
    } finally {
        hideLoader();
    }
}

function viewPosition(id) {
    const pos = allPositions.find(p => p.PositionID === id);
    if(pos) {
        // Modal popup logic
    }
}

function searchPositions(e) {
    const term = e.target.value.toLowerCase();
    applyPosFilters(term);
}

function filterPositions() {
    const term = document.querySelector('input[placeholder="Search positions..."]')?.value.toLowerCase() || '';
    applyPosFilters(term);
}

function applyPosFilters(searchTerm) {
    const selects = document.querySelectorAll('.card-body .form-select');
    const deptFilter = selects[0]?.value;

    filteredPositions = allPositions.filter(pos => {
        let match = true;
        if(searchTerm) {
            match = match && (
                (pos.PositionID && pos.PositionID.toLowerCase().includes(searchTerm)) ||
                (pos.PositionTitle && pos.PositionTitle.toLowerCase().includes(searchTerm))
            );
        }
        if (deptFilter && deptFilter !== 'All Departments') {
            match = match && pos.Department === deptFilter;
        }
        return match;
    });

    currentPosPage = 1;
    populatePositionTable();
}

function handleAddPosition() {
    const title = document.getElementById('newPosTitle')?.value.trim();
    const dept = document.getElementById('newPosDept')?.value;
    const subDept = document.getElementById('newPosSubDept')?.value || '';
    const reportsTo = document.getElementById('newPosReportsTo')?.value || '';
    const status = document.getElementById('newPosStatus')?.value;
    
    const data = {
        PositionTitle: title,
        Department: dept,
        SubDepartment: subDept,
        ReportsToPositionID: reportsTo,
        Status: status
    };
    
    createPosition(data);
}

function validatePositionForm(data) {
    if(!data.PositionTitle || !data.Department) {
        showError("Position Title and Department are required");
        return false;
    }
    return true;
}

function populatePositionTable() {
    const tbody = document.getElementById('positionsTableBody');
    if (!tbody) return;
    
    tbody.innerHTML = '';
    const pageData = paginateTable(filteredPositions, currentPosPage, posRowsPerPage);
    
    pageData.data.forEach(pos => {
        const canDelete = posSessionRole === 'Admin';
        const isVacant = pos.Status === 'Vacant';
        
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td class="ps-4 fw-semibold">${pos.PositionID}</td>
            <td>${pos.PositionTitle}</td>
            <td>${pos.Department}</td>
            <td>${pos.SubDepartment || '-'}</td>
            <td>${pos.ReportsToPositionID || '-'}</td>
            <td><span class="badge bg-${isVacant ? 'danger' : 'success'}">${pos.Status}</span></td>
            <td class="pe-4 text-end">
                <button class="btn btn-sm btn-light me-1" title="Edit" onclick="viewPosition('${pos.PositionID}')"><i class="bi bi-pencil"></i></button>
                ${canDelete ? `<button class="btn btn-sm btn-light text-danger" title="Delete" onclick="deletePosition('${pos.PositionID}')"><i class="bi bi-trash"></i></button>` : ''}
            </td>
        `;
        tbody.appendChild(tr);
    });
    
    // Call common pagination if ul exists
    const ul = document.querySelector('.pagination');
    if(ul) paginationPos(pageData, ul);
}

function paginationPos(pageData, ul) {
    ul.innerHTML = '';
    
    const prevLi = document.createElement('li');
    prevLi.className = `page-item ${pageData.currentPage === 1 ? 'disabled' : ''}`;
    prevLi.innerHTML = `<a class="page-link" href="#" onclick="changePosPage(${pageData.currentPage - 1}, event)">Previous</a>`;
    ul.appendChild(prevLi);
    
    for(let i = 1; i <= pageData.totalPages; i++) {
        const li = document.createElement('li');
        li.className = `page-item ${pageData.currentPage === i ? 'active' : ''}`;
        li.innerHTML = `<a class="page-link" href="#" onclick="changePosPage(${i}, event)">${i}</a>`;
        ul.appendChild(li);
    }
    
    const nextLi = document.createElement('li');
    nextLi.className = `page-item ${pageData.currentPage === pageData.totalPages || pageData.totalPages === 0 ? 'disabled' : ''}`;
    nextLi.innerHTML = `<a class="page-link" href="#" onclick="changePosPage(${pageData.currentPage + 1}, event)">Next</a>`;
    ul.appendChild(nextLi);
}

function changePosPage(page, e) {
    if(e) e.preventDefault();
    const totalPages = Math.ceil(filteredPositions.length / posRowsPerPage);
    if(page >= 1 && page <= totalPages) {
        currentPosPage = page;
        populatePositionTable();
    }
}
</script>
