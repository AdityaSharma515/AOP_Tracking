                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="#">Home</a></li>
                        <li class="breadcrumb-item active">Position Management</li>
                    </ol>
                </nav>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold mb-0">Position Management</h2>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addPositionModal"><i class="bi bi-plus-lg me-2"></i>Add Position</button>
                </div>

                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <input type="text" id="positionSearch" class="form-control" placeholder="Search positions...">
                            </div>
                            <div class="col-md-6">
                                <select class="form-select" id="positionDeptFilter">
                                    <option selected value="All Departments">All Departments</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4">Position Title</th>
                                        <th>Department</th>
                                        <th>Sub Department</th>
                                        <th>Reports To</th>
                                        <th>Status</th>
                                        <th class="pe-4 text-end">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="positionsTableBody">
                                    <tr><td colspan="6" class="text-center py-4 text-muted">Loading positions...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

    <!-- Add Position Modal -->
    <div class="modal fade" id="addPositionModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-light border-0">
                    <h5 class="modal-title fw-bold">Add New Position</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form>
                        <div class="mb-3">
                            <label class="form-label">Position Name</label>
                            <input type="text" id="newPosTitle" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Department</label>
                            <select class="form-select" id="newPosDept" required>
                                <option value="" selected disabled>Select Department</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Sub Department</label>
                            <select class="form-select" id="newPosSubDept">
                                <option value="" selected disabled>Select Sub Department</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Reports To Position</label>
                            <select class="form-select" id="newPosReportsTo">
                                <option value="" selected disabled>Select Parent Position</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Status</label>
                            <select class="form-select" id="newPosStatus" required>
                                <option value="Vacant" selected>Vacant</option>
                                <option value="Occupied">Occupied</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-0 bg-light">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="handleAddPosition()">Save Position</button>
                </div>
            </div>
        </div>
    </div>
