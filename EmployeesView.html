    <!-- Add Employee Modal -->
    <div class="modal fade" id="addEmployeeModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-light border-0">
                    <h5 class="modal-title fw-bold">Add New Employee</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Employee Code</label>
                                <input type="text" class="form-control" required id="newEmpCode">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Employee Name</label>
                                <input type="text" class="form-control" required id="newEmpName">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Department</label>
                                <select class="form-select" required id="newEmpDept">
                                    <option value="" selected disabled>Select Department</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Sub Department</label>
                                <select class="form-select" id="newEmpSubDept">
                                    <option value="" selected disabled>Select Sub Department</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Position</label>
                                <select class="form-select" required id="newEmpPosition">
                                    <option value="" selected disabled>Select Position</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Reports To</label>
                                <select class="form-select" id="newEmpManager">
                                    <option value="" selected disabled>Select Manager</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Joining Date</label>
                                <input type="date" class="form-control" required id="newEmpJoiningDate">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Status</label>
                                <select class="form-select" required id="newEmpStatus">
                                    <option value="Active" selected>Active</option>
                                    <option value="Inactive">Inactive</option>
                                </select>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-0 bg-light">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="handleAddEmployee()">Save Employee</button>
                </div>
            </div>
        </div>
    </div>
