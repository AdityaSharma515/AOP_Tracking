    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-5 col-lg-4">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4 p-md-5">
                        <div class="text-center mb-4">
                            <h4 class="fw-bold">Welcome Back</h4>
                            <p class="text-muted">Login to your account</p>
                        </div>
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="loginEmail" class="form-label">Email</label>
                                <input type="email" class="form-control" id="loginEmail" placeholder="name@company.com" required>
                                <!-- Validation placeholder -->
                                <div class="invalid-feedback d-none">Please enter a valid email.</div>
                            </div>
                            <div class="mb-3">
                                <label for="loginPassword" class="form-label">Password</label>
                                <div class="input-group">
                                    <input type="password" class="form-control" id="loginPassword" placeholder="Enter password" required>
                                    <button class="btn btn-outline-secondary" type="button" id="toggleLoginPassword">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                                <!-- Validation placeholder -->
                                <div class="invalid-feedback d-none">Please enter your password.</div>
                            </div>
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input" id="rememberMe">
                                    <label class="form-check-label text-muted" for="rememberMe">Remember Me</label>
                                </div>
                                <a href="#" class="text-decoration-none small">Forgot Password?</a>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 mb-3" id="loginBtn">
                                <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                                Login
                            </button>
                            <div class="text-center mt-3">
                                <p class="text-muted small">Don't have an account? <a href="#" onclick="navigateTo('Signup'); return false;" class="text-decoration-none">Go To Signup</a></p>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
