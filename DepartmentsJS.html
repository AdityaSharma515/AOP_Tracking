<script>
/**
 * js/departments.html
 */
var allDepartments = [];
var allSubDepartments = [];
var deptSessionRole = null;
var deptInitialized = false;

function initDepartments() {
    if (deptInitialized) return;
    deptInitialized = true;
    deptSessionRole = currentUserRole;
    loadDepartments();
}

async function loadDepartments() {
    var tbody = document.getElementById('departmentsTableBody');
    showLoader();
    try {
        // Load departments first
        var deptRes = await server.getDepartments(localStorage.getItem('sessionId'));
        
        if (deptRes && deptRes.success) {
            allDepartments = Array.isArray(deptRes.data) ? deptRes.data : [];
        } else {
            allDepartments = [];
            if (tbody) tbody.innerHTML = '<tr><td colspan="2" class="text-center py-4 text-muted">No departments found (' + (deptRes ? deptRes.message : 'No response') + ')</td></tr>';
            hideLoader();
            return;
        }
        
        // Load sub-departments separately (don't block departments from showing)
        try {
            var subDeptRes = await server.getSubDepartments(localStorage.getItem('sessionId'));
            allSubDepartments = (subDeptRes && subDeptRes.success && Array.isArray(subDeptRes.data)) ? subDeptRes.data : [];
        } catch (subErr) {
            allSubDepartments = [];
        }
        
        populateDepartmentTable();
        populateDepartmentDropdowns();
    } catch (e) {
        if (tbody) tbody.innerHTML = '<tr><td colspan="2" class="text-center py-4 text-danger">Error: ' + (e.message || e) + '</td></tr>';
    } finally {
        hideLoader();
    }
}

async function createDepartment(name) {
    if(!name) return;
    showLoader();
    try {
        const res = await server.createDepartment(localStorage.getItem('sessionId'), name);
        if (res.success) {
            showSuccess("Department created");
            loadDepartments();
            const modal = bootstrap.Modal.getInstance(document.getElementById('addDepartmentModal'));
            if(modal) modal.hide();
        } else {
            showError(res.message);
        }
    } catch (e) {
        showError("Creation failed");
    } finally {
        hideLoader();
    }
}

async function updateDepartment(id, name) {
    showLoader();
    try {
        const res = await server.updateDepartment(localStorage.getItem('sessionId'), id, name);
        if (res.success) {
            showSuccess("Department updated");
            loadDepartments();
            const modal = bootstrap.Modal.getInstance(document.getElementById('editDepartmentModal'));
            if(modal) modal.hide();
        } else {
            showError(res.message);
        }
    } catch (e) {
        showError("Update failed");
    } finally {
        hideLoader();
    }
}

async function deleteDepartment(id) {
    if (!confirmDelete()) return;
    showLoader();
    try {
        const res = await server.deleteDepartment(localStorage.getItem('sessionId'), id);
        if (res.success) {
            showSuccess("Department deleted");
            loadDepartments();
        } else {
            showError(res.message);
        }
    } catch (e) {
        showError("Deletion failed");
    } finally {
        hideLoader();
    }
}

async function createSubDepartment(deptId, name) {
    showLoader();
    try {
        const res = await server.createSubDepartment(localStorage.getItem('sessionId'), deptId, name);
        if (res.success) {
            showSuccess("Sub department created");
            loadDepartments();
            const modal = bootstrap.Modal.getInstance(document.getElementById('addSubDepartmentModal'));
            if(modal) modal.hide();
        }
        else showError(res.message);
    } catch (e) {
        showError("Failed to create sub department");
    } finally {
        hideLoader();
    }
}

async function deleteSubDepartment(id) {
    if (!confirmDelete()) return;
    showLoader();
    try {
        const res = await server.deleteSubDepartment(localStorage.getItem('sessionId'), id);
        if (res.success) {
            showSuccess("Sub department deleted");
            loadDepartments();
        } else {
            showError(res.message);
        }
    } catch (e) {
        showError("Deletion failed");
    } finally {
        hideLoader();
    }
}

function editDepartment(id) {
    const dept = allDepartments.find(d => d.DepartmentID === id);
    if (!dept) return;
    
    document.getElementById('editDeptId').value = dept.DepartmentID;
    document.getElementById('editDeptName').value = dept.DepartmentName;
    
    const modal = new bootstrap.Modal(document.getElementById('editDepartmentModal'));
    modal.show();
}

function handleEditDepartment() {
    const id = document.getElementById('editDeptId').value;
    const nameInput = document.getElementById('editDeptName');
    
    if (id && nameInput && nameInput.value) {
        updateDepartment(id, nameInput.value.trim());
    } else {
        showError("Department name is required");
    }
}

function populateDepartmentTable() {
    const tbody = document.getElementById('departmentsTableBody');
    if (!tbody) return;
    
    tbody.innerHTML = '';
    
    allDepartments.forEach(dept => {
        const canDelete = deptSessionRole === 'Admin';
        
        const tr = document.createElement('tr');
        tr.className = 'table-light';
        tr.innerHTML = `
            <td class="ps-4 fw-bold">${dept.DepartmentName}</td>
            <td class="pe-4 text-end">
                <button class="btn btn-sm btn-light me-1" onclick="editDepartment('${dept.DepartmentID}')"><i class="bi bi-pencil"></i></button>
                ${canDelete ? `<button class="btn btn-sm btn-light text-danger" onclick="deleteDepartment('${dept.DepartmentID}')"><i class="bi bi-trash"></i></button>` : ''}
            </td>
        `;
        tbody.appendChild(tr);

        // Sub Departments Rows
        const subDepts = allSubDepartments.filter(sub => sub.DepartmentID === dept.DepartmentID);
        if (subDepts.length > 0) {
            subDepts.forEach(sub => {
                const subTr = document.createElement('tr');
                subTr.innerHTML = `
                    <td class="ps-5 text-muted"><i class="bi bi-arrow-return-right me-2"></i> ${sub.SubDepartmentName}</td>
                    <td class="pe-4 text-end">
                        ${canDelete ? `<button class="btn btn-sm btn-light text-danger" onclick="deleteSubDepartment('${sub.SubDepartmentID}')"><i class="bi bi-trash"></i></button>` : ''}
                    </td>
                `;
                tbody.appendChild(subTr);
            });
        } else {
            const emptyTr = document.createElement('tr');
            emptyTr.innerHTML = `<td colspan="2" class="text-muted ps-5 small fst-italic">No sub-departments</td>`;
            tbody.appendChild(emptyTr);
        }
    });

    if (allDepartments.length === 0) {
         tbody.innerHTML = `<tr><td colspan="2" class="text-center py-4 text-muted">No departments found</td></tr>`;
    }
}

function handleAddDepartment() {
    const nameInput = document.getElementById('newDeptName');
    if (nameInput && nameInput.value) {
        createDepartment(nameInput.value.trim());
        nameInput.value = '';
    } else {
        showError("Department name is required");
    }
}

function handleAddSubDepartment() {
    const deptId = document.getElementById('parentDeptForSub').value;
    const nameInput = document.getElementById('newSubDeptName');
    if (deptId && nameInput && nameInput.value) {
        createSubDepartment(deptId, nameInput.value.trim());
        nameInput.value = '';
    } else {
        showError("Please select a department and enter a sub-department name");
    }
}

function populateDepartmentDropdowns() {
    const dropdown = document.getElementById('parentDeptForSub');
    if (!dropdown) return;
    
    dropdown.innerHTML = '<option value="" selected disabled>Select Department</option>';
    allDepartments.forEach(dept => {
        dropdown.innerHTML += `<option value="${dept.DepartmentID}">${dept.DepartmentName}</option>`;
    });
}
</script>
