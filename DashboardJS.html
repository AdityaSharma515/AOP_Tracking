<script>
/**
 * js/dashboard.html
 */
var sessionData = null;
var dashInitialized = false;

function initDashboard() {
    if (dashInitialized) return;
    dashInitialized = true;
    loadDashboard();
}

async function loadDashboard() {
    showLoader();
    try {
        await Promise.all([
            loadStatistics(),
            loadDepartmentSummary(),
            loadVacancySummary(),
            loadAOPSummary(),
            loadRecentActivity()
        ]);
    } catch (e) {
        showError("Failed to load dashboard data");
    } finally {
        hideLoader();
    }
}

async function loadStatistics() {
    const res = await server.getDashboardStats(localStorage.getItem('sessionId'));
    if (res.success) {
        const stats = res.data;
        const h2Elements = document.querySelectorAll('.card-body h2');
        if (h2Elements.length >= 6) {
            h2Elements[0].textContent = stats.totalEmployees;
            h2Elements[1].textContent = stats.totalPositions;
            h2Elements[2].textContent = stats.totalPositions - stats.vacantPositions;
            h2Elements[3].textContent = stats.vacantPositions;
            h2Elements[4].textContent = stats.departments;
            h2Elements[5].textContent = stats.subDepartments;
        }
    }
}

async function loadDepartmentSummary() {
    const res = await server.getVacancySummary(localStorage.getItem('sessionId'));
    if (res.success) {
        const tbody = document.querySelector('.table tbody');
        if (tbody) {
            tbody.innerHTML = '';
            for (const [dept, data] of Object.entries(res.data)) {
                tbody.innerHTML += `
                    <tr>
                        <td>${dept}</td>
                        <td>${data.Total}</td>
                        <td>${data.Occupied}</td>
                        <td><span class="badge bg-${data.Vacant > 0 ? 'danger' : 'success'}">${data.Vacant}</span></td>
                    </tr>
                `;
            }
        }
    }
}

async function loadVacancySummary() {
    // Currently populated together with department summary in the same table.
    // If there were charts, initialization logic goes here.
}

async function loadAOPSummary() {
    // Logic for loading AOP specific widgets/charts goes here
}

async function loadRecentActivity() {
    const res = await server.getRecentActivity(localStorage.getItem('sessionId'));
    if (res.success) {
        const list = document.getElementById('recentActivityList');
        if (list) {
            list.innerHTML = '';
            if (res.data.length === 0) {
                list.innerHTML = '<li class="list-group-item px-0 text-center text-muted">No recent activity</li>';
                return;
            }
            res.data.forEach(activity => {
                const time = new Date(activity.timestamp).toLocaleString();
                let icon = 'bi-info-circle text-primary';
                if (activity.action === 'Create') icon = 'bi-plus-circle text-success';
                else if (activity.action === 'Update') icon = 'bi-pencil text-warning';
                else if (activity.action === 'Delete') icon = 'bi-trash text-danger';

                list.innerHTML += `
                    <li class="list-group-item px-0">
                        <div class="d-flex align-items-center">
                            <div class="flex-shrink-0 me-3">
                                <i class="bi ${icon} fs-5"></i>
                            </div>
                            <div class="flex-grow-1 min-w-0">
                                <h6 class="mb-1 text-truncate" style="font-size: 0.9rem;">${activity.action} ${activity.recordType}</h6>
                                <p class="mb-0 text-muted small text-truncate">by ${activity.user}</p>
                            </div>
                            <div class="flex-shrink-0 ms-2 text-muted" style="font-size: 0.75rem;">
                                ${time}
                            </div>
                        </div>
                    </li>
                `;
            });
        }
    }
}

function refreshDashboard() {
    loadDashboard();
}
</script>
