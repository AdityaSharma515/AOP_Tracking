<script>
/**
 * js/employees.html
 */
var allEmployees = [];
var filteredEmployees = [];
var currentPage = 1;
var rowsPerPage = 10;
var empSessionRole = null;
var empInitialized = false;

function initEmployees() {
    if (empInitialized) return;
    empInitialized = true;
    empSessionRole = currentUserRole;
    setupEventListeners();
    loadEmployees();
    loadEmpDepartments();
    loadEmpPositions();
}

function setupEventListeners() {
    const searchInput = document.querySelector('input[placeholder="Search employees..."]');
    if(searchInput) searchInput.addEventListener('input', debounce(searchEmployees, 300));
    
    const filters = document.querySelectorAll('.form-select');
    filters.forEach(f => f.addEventListener('change', filterEmployees));
    
    const deptSelect = document.getElementById('newEmpDept');
    if (deptSelect) {
        deptSelect.addEventListener('change', (e) => {
            const deptName = e.target.value;
            const dept = empDepartmentsList.find(d => d.DepartmentName === deptName);
            const subDeptSelect = document.getElementById('newEmpSubDept');
            if (subDeptSelect) {
                subDeptSelect.innerHTML = '<option value="" selected disabled>Select Sub Department</option>';
                if (dept) {
                    const subs = empSubDepartmentsList.filter(s => s.DepartmentID === dept.DepartmentID);
                    subs.forEach(s => {
                        subDeptSelect.innerHTML += `<option value="${s.SubDepartmentName}">${s.SubDepartmentName}</option>`;
                    });
                }
            }
        });
    }

    const addEmpModalEl = document.getElementById('addEmployeeModal');
    if (addEmpModalEl) {
        addEmpModalEl.addEventListener('hidden.bs.modal', () => {
            document.querySelector('#addEmployeeModal form').reset();
            document.querySelector('#addEmployeeModal .modal-title').textContent = 'Add New Employee';
            if (typeof editingEmployeeCode !== 'undefined') editingEmployeeCode = null;
        });
    }
}

async function loadEmployees() {
    showLoader();
    try {
        const res = await server.getEmployees(localStorage.getItem('sessionId'));
        if (res.success) {
        } else {
            showError(res.message);
        }
    } catch (e) {
        showError("Failed to load employees");
    } finally {
        hideLoader();
    }
}

async function createEmployee(data) {
    if (!validateEmployeeForm(data)) return;
    
    showLoader();
    try {
        const res = await server.createEmployee(localStorage.getItem('sessionId'), data);
        if (res.success) {
            showSuccess("Employee created");
            loadEmployees();
            const modal = bootstrap.Modal.getInstance(document.getElementById('addEmployeeModal'));
            if(modal) modal.hide();
            document.querySelector('#addEmployeeModal form').reset();
        } else {
            showError(res.message);
        }
    } catch (e) {
        showError("Creation failed");
    } finally {
        hideLoader();
    }
}

async function updateEmployee(code, data) {
    showLoader();
    try {
        const res = await server.updateEmployee(localStorage.getItem('sessionId'), code, data);
        if (res.success) {
            showSuccess("Employee updated");
            loadEmployees();
            const modal = bootstrap.Modal.getInstance(document.getElementById('addEmployeeModal'));
            if(modal) modal.hide();
        } else {
            showError(res.message);
        }
    } catch (e) {
        showError("Update failed");
    } finally {
        hideLoader();
    }
}

async function deleteEmployee(code) {
    if (!confirmDelete()) return;
    showLoader();
    try {
        const res = await server.deleteEmployee(localStorage.getItem('sessionId'), code);
        if (res.success) {
            showSuccess("Employee deleted");
            loadEmployees();
        } else {
            showError(res.message);
        }
    } catch (e) {
        showError("Deletion failed");
    } finally {
        hideLoader();
    }
}

let editingEmployeeCode = null;

function viewEmployee(code) {
    const emp = allEmployees.find(e => e.EmployeeCode === code);
    if(emp) {
        document.getElementById('newEmpCode').value = emp.EmployeeCode;
        document.getElementById('newEmpName').value = emp.EmployeeName;
        document.getElementById('newEmpDept').value = emp.Department;
        
        const e = new Event('change');
        document.getElementById('newEmpDept').dispatchEvent(e);
        
        setTimeout(() => {
            document.getElementById('newEmpSubDept').value = emp.SubDepartment || '';
            document.getElementById('newEmpPosition').value = emp.PositionID || '';
            document.getElementById('newEmpManager').value = emp.ReportsTo || '';
            
            if (emp.JoiningDate) {
                try {
                    const d = new Date(emp.JoiningDate);
                    if (!isNaN(d.getTime())) {
                        const yyyy = d.getFullYear();
                        const mm = String(d.getMonth() + 1).padStart(2, '0');
                        const dd = String(d.getDate()).padStart(2, '0');
                        document.getElementById('newEmpJoiningDate').value = `${yyyy}-${mm}-${dd}`;
                    }
                } catch(err) {}
            }
            
            document.getElementById('newEmpStatus').value = emp.Status;
        }, 100);

        document.querySelector('#addEmployeeModal .modal-title').textContent = 'Edit Employee';
        editingEmployeeCode = code;
        
        const modal = bootstrap.Modal.getOrCreateInstance(document.getElementById('addEmployeeModal'));
        modal.show();
    }
}

function searchEmployees(e) {
    const term = e.target.value.toLowerCase();
    applyFilters(term);
}

function filterEmployees() {
    const term = document.querySelector('input[placeholder="Search employees..."]').value.toLowerCase();
    applyFilters(term);
}

function applyFilters(searchTerm) {
    const deptFilter = document.getElementById('empDeptFilter')?.value;
    const statusFilter = document.getElementById('empStatusFilter')?.value;

    filteredEmployees = allEmployees.filter(emp => {
        let match = true;
        
        if (searchTerm) {
            match = match && (
                (emp.EmployeeCode && emp.EmployeeCode.toLowerCase().includes(searchTerm)) ||
                (emp.EmployeeName && emp.EmployeeName.toLowerCase().includes(searchTerm))
            );
        }
        
        if (deptFilter && deptFilter !== 'All Departments') match = match && emp.Department === deptFilter;
        if (statusFilter && statusFilter !== 'All Statuses') match = match && emp.Status === statusFilter;
        
        return match;
    });

    currentPage = 1;
    populateEmployeeTable();
}

function resetFilters() {
    document.querySelector('input[placeholder="Search employees..."]').value = '';
    const deptFilter = document.getElementById('empDeptFilter');
    const statusFilter = document.getElementById('empStatusFilter');
    if (deptFilter) deptFilter.selectedIndex = 0;
    if (statusFilter) statusFilter.selectedIndex = 0;
    
    filteredEmployees = [...allEmployees];
    currentPage = 1;
    populateEmployeeTable();
}

function populateEmployeeTable() {
    const tbody = document.getElementById('employeesTableBody');
    if (!tbody) return;
    
    tbody.innerHTML = '';
    const pageData = paginateTable(filteredEmployees, currentPage, rowsPerPage);
    
    pageData.data.forEach(emp => {
        const tr = document.createElement('tr');
        const canDelete = ['Admin'].includes(empSessionRole);
        const canEdit = ['Admin', 'Plant Head', 'AGM', 'Sr Manager'].includes(empSessionRole);
        
        let posObj = empPositionsList.find(p => p.PositionID === emp.PositionID);
        let posName = posObj ? posObj.PositionTitle : (emp.PositionID || '-');
        
        tr.innerHTML = `
            <td class="ps-4 fw-semibold">${emp.EmployeeCode}</td>
            <td>
                <span>${emp.EmployeeName}</span>
            </td>
            <td>${emp.Department}</td>
            <td>${emp.SubDepartment || '-'}</td>
            <td>${posName}</td>
            <td><span class="badge bg-${emp.Status === 'Active' ? 'success' : 'secondary'}">${emp.Status}</span></td>
            <td class="pe-4 text-end text-nowrap">
                <button class="btn btn-sm btn-light me-1" title="View" onclick="viewEmployee('${emp.EmployeeCode}')"><i class="bi bi-eye"></i></button>
                ${canEdit ? `<button class="btn btn-sm btn-light me-1" title="Edit" onclick="viewEmployee('${emp.EmployeeCode}')"><i class="bi bi-pencil"></i></button>` : ''}
                ${canDelete ? `<button class="btn btn-sm btn-light text-danger" title="Delete" onclick="deleteEmployee('${emp.EmployeeCode}')"><i class="bi bi-trash"></i></button>` : ''}
            </td>
        `;
        tbody.appendChild(tr);
    });
    
    pagination(pageData);
}

function pagination(pageData) {
    const ul = document.querySelector('.pagination');
    if (!ul) return;
    
    ul.innerHTML = '';
    
    // Prev
    const prevLi = document.createElement('li');
    prevLi.className = `page-item ${pageData.currentPage === 1 ? 'disabled' : ''}`;
    prevLi.innerHTML = `<a class="page-link" href="#" onclick="changePage(${pageData.currentPage - 1}, event)">Previous</a>`;
    ul.appendChild(prevLi);
    
    // Pages
    for(let i = 1; i <= pageData.totalPages; i++) {
        const li = document.createElement('li');
        li.className = `page-item ${pageData.currentPage === i ? 'active' : ''}`;
        li.innerHTML = `<a class="page-link" href="#" onclick="changePage(${i}, event)">${i}</a>`;
        ul.appendChild(li);
    }
    
    // Next
    const nextLi = document.createElement('li');
    nextLi.className = `page-item ${pageData.currentPage === pageData.totalPages || pageData.totalPages === 0 ? 'disabled' : ''}`;
    nextLi.innerHTML = `<a class="page-link" href="#" onclick="changePage(${pageData.currentPage + 1}, event)">Next</a>`;
    ul.appendChild(nextLi);
}

function changePage(page, e) {
    if(e) e.preventDefault();
    const totalPages = Math.ceil(filteredEmployees.length / rowsPerPage);
    if(page >= 1 && page <= totalPages) {
        currentPage = page;
        populateEmployeeTable();
    }
}

var empDepartmentsList = [];
var empSubDepartmentsList = [];
var empPositionsList = [];
var empManagersList = [];

async function loadEmpDepartments() {
    try {
        const [deptRes, subDeptRes] = await Promise.all([
            server.getDepartments(localStorage.getItem('sessionId')),
            server.getSubDepartments(localStorage.getItem('sessionId'))
        ]);
        
        if(deptRes.success) {
            empDepartmentsList = deptRes.data;
            const deptSelect = document.getElementById('newEmpDept');
            const deptFilter = document.getElementById('empDeptFilter');
            if (deptSelect) {
                deptSelect.innerHTML = '<option value="" selected disabled>Select Department</option>';
                empDepartmentsList.forEach(d => {
                    deptSelect.innerHTML += `<option value="${d.DepartmentName}">${d.DepartmentName}</option>`;
                });
            }
            if (deptFilter) {
                deptFilter.innerHTML = '<option selected value="All Departments">All Departments</option>';
                empDepartmentsList.forEach(d => {
                    deptFilter.innerHTML += `<option value="${d.DepartmentName}">${d.DepartmentName}</option>`;
                });
            }
        }
        
        if (subDeptRes && subDeptRes.success) {
            empSubDepartmentsList = subDeptRes.data;
        }
    } catch(e){}
}

async function loadEmpPositions() {
    try {
        const res = await server.getPositions(localStorage.getItem('sessionId'));
        if(res.success) {
            empPositionsList = res.data;
            const posSelect = document.getElementById('newEmpPosition');
            if (posSelect) {
                posSelect.innerHTML = '<option value="" selected disabled>Select Position</option>';
                empPositionsList.forEach(p => {
                    posSelect.innerHTML += `<option value="${p.PositionID}">${p.PositionTitle} (${p.PositionID})</option>`;
                });
            }
        }
    } catch(e){}
}

function populateManagerDropdown() {
    const mgrSelect = document.getElementById('newEmpManager');
    if (mgrSelect) {
        mgrSelect.innerHTML = '<option value="" selected disabled>Select Manager</option>';
        allEmployees.forEach(e => {
            mgrSelect.innerHTML += `<option value="${e.EmployeeCode}">${e.EmployeeName} (${e.EmployeeCode})</option>`;
        });
    }
}

function handleAddEmployee() {
    const data = {
        EmployeeCode: document.getElementById('newEmpCode')?.value || '',
        EmployeeName: document.getElementById('newEmpName')?.value || '',
        Department: document.getElementById('newEmpDept')?.value || '',
        SubDepartment: document.getElementById('newEmpSubDept')?.value || '',
        PositionID: document.getElementById('newEmpPosition')?.value || '',
        ReportsTo: document.getElementById('newEmpManager')?.value || '',
        JoiningDate: document.getElementById('newEmpJoiningDate')?.value || '',
        Status: document.getElementById('newEmpStatus')?.value || 'Active'
    };
    
    if (validateEmployeeForm(data)) {
        if (typeof editingEmployeeCode !== 'undefined' && editingEmployeeCode) {
            updateEmployee(editingEmployeeCode, data);
        } else {
            createEmployee(data);
        }
    }
}

function validateEmployeeForm(data) {
    if(!data.EmployeeCode || !data.EmployeeName) {
        showError("Employee Code and Name are required.");
        return false;
    }
    return true;
}

// Attach export handler if export button exists
function exportEmployeeData() {
    exportToExcel(filteredEmployees, "Employees_Export");
}
</script>
