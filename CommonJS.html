<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
/**
 * js/common.html
 * Common utility functions for Google Apps Script Frontend
 */

// Promisify google.script.run for clean async/await syntax
const server = new Proxy({}, {
    get: function(target, prop) {
        return function(...args) {
            return new Promise((resolve, reject) => {
                if (typeof google !== 'undefined' && google.script && google.script.run) {
                    google.script.run
                        .withSuccessHandler(resolve)
                        .withFailureHandler(reject)
                        [prop](...args);
                } else {
                    console.warn(`google.script.run.${prop}() mocked for local dev`);
                    resolve({success: false, message: 'Local dev mock'});
                }
            });
        };
    }
});

function showLoader() {
    let loader = document.getElementById('global-loader');
    if (!loader) {
        loader = document.createElement('div');
        loader.id = 'global-loader';
        loader.className = 'position-fixed top-0 start-0 w-100 h-100 d-flex justify-content-center align-items-center bg-white d-none';
        loader.style.zIndex = '9999';
        loader.style.opacity = '0.75';
        loader.innerHTML = '<div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading...</span></div>';
        document.body.appendChild(loader);
    }
    loader.classList.remove('d-none');
}

function hideLoader() {
    const loader = document.getElementById('global-loader');
    if (loader) loader.classList.add('d-none');
}

function showToast(message, type = 'success') {
    const toastEl = document.getElementById('liveToast');
    if (!toastEl) return;
    
    toastEl.className = `toast align-items-center text-white bg-${type} border-0`;
    const body = toastEl.querySelector('.toast-body');
    if(body) body.textContent = message;
    
    const toast = new bootstrap.Toast(toastEl);
    toast.show();
}

function showSuccess(message) {
    showToast(message, 'success');
}

function showError(message) {
    showToast(message, 'danger');
}

function confirmDelete(message = 'Are you sure you want to delete this record? This action cannot be undone.') {
    return confirm(message);
}

async function validateSession() {
    const sessionId = localStorage.getItem('sessionId');
    if (!sessionId) {
        window.top.location.href = "<?= ScriptApp.getService().getUrl() ?>?page=Login";
        return null;
    }
    try {
        const res = await server.validateSession(sessionId);
        if (!res.success) {
            localStorage.removeItem('sessionId');
            window.top.location.href = "<?= ScriptApp.getService().getUrl() ?>?page=Login";
            return null;
        }
        return res.data;
    } catch (e) {
        showError("Session validation failed.");
        return null;
    }
}

async function logout() {
    const sessionId = localStorage.getItem('sessionId');
    if (sessionId) {
        showLoader();
        try {
            await server.logoutUser(sessionId);
        } catch(e) {}
        localStorage.removeItem('sessionId');
        hideLoader();
    }
    window.top.location.href = "<?= ScriptApp.getService().getUrl() ?>?page=Login";
}

function formatDate(isoString) {
    if (!isoString) return '';
    const d = new Date(isoString);
    return d.toLocaleDateString();
}

function exportToExcel(data, filename) {
    if (typeof XLSX === 'undefined') {
        showError('SheetJS library not loaded.');
        return;
    }
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
    XLSX.writeFile(wb, filename + ".xlsx");
}

function downloadPDF(headers, data, title, filename) {
    if (typeof window.jspdf === 'undefined') {
        showError('jsPDF library not loaded.');
        return;
    }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('landscape');
    
    doc.setFontSize(18);
    doc.text(title, 14, 22);
    doc.setFontSize(11);
    doc.text("Date: " + new Date().toLocaleDateString(), 14, 30);
    
    doc.autoTable({
        startY: 36,
        head: [headers],
        body: data,
        theme: 'striped',
        headStyles: { fillColor: [41, 128, 185] },
        didDrawPage: function (data) {
            let str = "Page " + doc.internal.getNumberOfPages();
            doc.setFontSize(10);
            let pageSize = doc.internal.pageSize;
            let pageHeight = pageSize.height ? pageSize.height : pageSize.getHeight();
            doc.text(str, data.settings.margin.left, pageHeight - 10);
        }
    });
    
    doc.save(filename + '.pdf');
}

async function downloadPNG(elementId, filename) {
    const element = document.getElementById(elementId);
    if (!element) return;
    
    showLoader();
    try {
        const canvas = await html2canvas(element);
        const link = document.createElement('a');
        link.download = filename + '.png';
        link.href = canvas.toDataURL();
        link.click();
    } catch (error) {
        showError("Failed to generate PNG");
    } finally {
        hideLoader();
    }
}

function debounce(func, wait) {
    let timeout;
    return function executedFunction(...args) {
        const later = () => {
            clearTimeout(timeout);
            func(...args);
        };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
    };
}

function paginateTable(data, page, rowsPerPage) {
    const startIndex = (page - 1) * rowsPerPage;
    const endIndex = startIndex + rowsPerPage;
    return {
        data: data.slice(startIndex, endIndex),
        totalPages: Math.ceil(data.length / rowsPerPage),
        currentPage: page,
        totalItems: data.length
    };
}

// Global hook for logout buttons
document.addEventListener('DOMContentLoaded', () => {
    const logoutBtn = document.querySelector('a[href="Login.html"].text-danger');
    if (logoutBtn) {
        logoutBtn.addEventListener('click', (e) => {
            e.preventDefault();
            logout();
        });
    }
});
</script>
